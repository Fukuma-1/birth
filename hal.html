<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masukkan Nama</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    h1 {
      color: #d63384;
      margin-bottom: 20px;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    input {
      width: 80%;
      padding: 15px;
      margin: 20px 0;
      border: 2px solid #d63384;
      border-radius: 10px;
      font-size: 18px;
      text-align: center;
    }

    button {
      background: #d63384;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #b0256b;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎂 Selamat Datang 🎂</h1>
    <p>Masukkan nama Anda untuk membuka ucapan ulang tahun spesial.</p>

    <input type="text" id="nameInput" placeholder="Masukkan nama Anda">
    <br>
    <button onclick="goToBirthdayPage()">Buka Ucapan</button>
  </div>

  <script>
    function goToBirthdayPage() {
      const name = document.getElementById('nameInput').value.trim();

      if (!name) {
        alert('Silakan masukkan nama terlebih dahulu!');
        return;
      }

      localStorage.setItem('birthdayName', name);
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
